<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Tea Cozy</title>
  </head>
  <body>
    <!--header-->

    <div class="container">
      <div class="logo">
        <img src="/images/img-tea-cozy-logo.webp" alt="" />
      </div>
      <div class="nav-bar">
        <ul>
          <li>Mission</li>
          <li>Featured Tea</li>
          <li>Locations</li>
        </ul>
      </div>
    </div>

    <!--main-->

    <section class="mission">
      <div class="mission-paragragh">
        <h2>Our Mission</h2>
        <h4>
          handpicked, artisanally curated, free range, sustainable, small batch,
          fair trade, organic tea
        </h4>
      </div>
    </section>

    <section class="galery">
      <div class="galery-text">
        <h2>tea of the month</h2>
        <h4>what's steeping at the tea cozy?</h4>
      </div>
      <div class="galery-images">
        <figure>
          <img src="/images/img-berryblitz.webp" alt="" />
          <figcaption>fall berry blitz tea</figcaption>
        </figure>
        <figure>
          <img src="/images/img-spiced-rum.webp" alt="" />
          <figcaption>Spiced Rum Tea</figcaption>
        </figure>
        <figure>
          <img src="/images/img-donut.webp" alt="" />
          <figcaption>seasonal donut</figcaption>
        </figure>
        <figure>
          <img src="/images/img-myrtle-ave.webp" alt="" />
          <figcaption>myrtle ave tea</figcaption>
        </figure>
        <figure>
          <img src="/images/img-bedford-bizarre.webp" alt="" />
          <figcaption>bedford bizarre tea</figcaption>
        </figure>
      </div>
    </section>

    <section class="location border">
      <div class="location-address border"></div>
      <div class="location-address border"></div>
      <div class="location-address border"></div>
    </section>

    <footer class="contact-bar border">
      <div class="company-data">
        <h2>the tea cozy</h2>
      </div>
      <div class="company-data">
        <h5>contact@theteacozy.com</h5>
      </div>
      <div class="company-data">
        <h5>917-555-8904</h5>
      </div>
    </footer>

    <div id="copyright">
      <h5>copyright The Tea Cozy 2021</h5>
    </div>
  </body>
</html>
